<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RecruiterStack</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #0f172a;
      width: 260px;
      margin: 0;
      padding: 16px;
    }
    h1 { font-size: 15px; margin: 0 0 10px; }
    #status { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .ok { color: #059669; }
    .error { color: #dc2626; }
    p { font-size: 12px; color: #475569; line-height: 1.5; margin: 0 0 14px; }
    button {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: #059669;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover { background: #047857; }
  </style>
</head>
<body>
  <h1>RecruiterStack</h1>
  <div id="status">Checking…</div>
  <p>On a LinkedIn profile, click the green “Add to sequence” button in the bottom-right corner to enrol that person.</p>
  <button id="opts">Open settings</button>
  <script src="popup.js"></script>
</body>
</html>
