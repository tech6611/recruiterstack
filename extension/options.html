<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RecruiterStack Extension — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #0f172a;
      max-width: 460px;
      margin: 32px auto;
      padding: 0 20px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p.sub { color: #64748b; font-size: 13px; margin: 0 0 20px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin: 16px 0 6px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 9px 11px;
      font-size: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      color: #0f172a;
    }
    input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.15); }
    .row { display: flex; gap: 8px; margin-top: 20px; }
    button {
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    #save { background: #059669; color: #fff; }
    #save:hover { background: #047857; }
    #test { background: #fff; color: #334155; border-color: #cbd5e1; }
    #test:hover { background: #f8fafc; }
    #status { margin-top: 16px; font-size: 13px; min-height: 18px; }
    .ok { color: #059669; }
    .error { color: #dc2626; }
    .hint { color: #64748b; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Connect to RecruiterStack</h1>
  <p class="sub">Paste an API key from RecruiterStack → Settings → API Keys.</p>

  <label for="baseUrl">Platform URL</label>
  <input id="baseUrl" type="url" placeholder="https://recruiterstack.in" />
  <div class="hint">Use http://localhost:3000 when testing locally.</div>

  <label for="apiKey">API key</label>
  <input id="apiKey" type="password" placeholder="rs_live_..." autocomplete="off" />

  <div class="row">
    <button id="save">Save</button>
    <button id="test">Test connection</button>
  </div>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
