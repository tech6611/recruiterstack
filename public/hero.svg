<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-label="RecruiterStack careers hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#221b14"/>
      <stop offset="1" stop-color="#3b2f22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0d9668"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>

  <!-- soft decorative glyphs -->
  <g fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.10">
    <g transform="translate(1230 60) scale(9)">
      <path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="m3 13 9 5 9-5"/><path d="m3 18 9 5 9-5"/>
    </g>
    <g transform="translate(1420 300) scale(5)">
      <path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="m3 13 9 5 9-5"/><path d="m3 18 9 5 9-5"/>
    </g>
  </g>

  <!-- logo tile -->
  <g transform="translate(120 130)">
    <rect width="120" height="120" rx="26" fill="#f6efe3"/>
    <g transform="translate(60 60) scale(3) translate(-12 -12)"
       fill="none" stroke="#221b14" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3 3 8l9 5 9-5-9-5Z"/>
      <path d="m3 13 9 5 9-5"/>
      <path d="m3 18 9 5 9-5" opacity="0.5"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="270" y="205" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="700" fill="#f6efe3">RecruiterStack</text>
  <text x="272" y="270" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="400" fill="#c9bfa8">Build the future of hiring with us</text>

  <rect x="272" y="320" width="150" height="6" rx="3" fill="url(#accent)"/>
</svg>
